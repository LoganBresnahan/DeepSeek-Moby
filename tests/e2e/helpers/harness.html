<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Moby — Test Harness</title>
  <link href="../../../dist/media/chat.css" rel="stylesheet">
</head>
<body data-moby-icon="../../../dist/media/moby.png" data-dev-mode="false">
  <div class="chat-container">
    <div class="header">
      <img src="../../../dist/media/moby.png" alt="DeepSeek Moby" class="header-icon">
      <div id="toastContainer" class="toast-container"></div>
      <div class="header-actions">
        <div class="drawing-server-selector">
          <button id="drawingServerBtn" class="drawing-server-btn" title="Drawing Pad">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M13.5 1.5l1 1-9 9-2.5.5.5-2.5 9-9zm-1.4.6l-8.6 8.6-.3 1.3 1.3-.3 8.6-8.6-1-1zM2 13h12v1H2v-1z"/>
            </svg>
          </button>
        </div>
        <div id="webSearchHost"></div>
        <div id="fileContextHost"></div>
        <div id="modelSelectorHost"></div>
        <div id="commandsHost"></div>
        <div id="historyHost"></div>
        <div id="settingsHost"></div>
      </div>
    </div>
    <div id="virtualListHost"></div>
    <div class="input-area">
      <div id="attachmentsHost"></div>
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Ask DeepSeek..." rows="1"></textarea>
        <div class="input-controls">
          <button id="stopBtn" class="stop-btn" title="Stop" style="display: none;">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="1"/></svg>
          </button>
          <button id="sendBtn" class="send-btn" title="Send message">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 1.91L7.37 8 1 14.09 1.91 15 9 8 1.91 1 1 1.91z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="../../../dist/media/chat.js"></script>
</body>
</html>
